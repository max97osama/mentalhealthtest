server {
	    listen 80;
	        server_name mentalhealthtest.duckdns.org;
		    return 301 https://$host$request_uri;
	    }

	    server {
		        listen 443 ssl;
			    server_name mentalhealthtest.duckdns.org;

			        ssl_certificate     /etc/letsencrypt/live/mentalhealthtest.duckdns.org/fullchain.pem;
				    ssl_certificate_key /etc/letsencrypt/live/mentalhealthtest.duckdns.org/privkey.pem;
				        include             /etc/letsencrypt/options-ssl-nginx.conf;
					    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

					        location / {
							        proxy_pass         http://localhost:3001;
								        proxy_http_version 1.1;
									        proxy_set_header   Upgrade $http_upgrade;
										        proxy_set_header   Connection 'upgrade';
											        proxy_set_header   Host $host;
												        proxy_set_header   X-Real-IP $remote_addr;
													        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
														        proxy_cache_bypass $http_upgrade;
															    }
														    }

